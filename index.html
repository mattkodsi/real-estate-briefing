<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#fafaf7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#101214" media="(prefers-color-scheme: dark)">
  <title>Real Estate Briefing</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗞️</text></svg>">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <!-- bump ?v= on every deploy so cached pages can never pair old code with new data -->
  <link rel="stylesheet" href="css/style.css?v=12">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
</head>
<body>

  <header class="masthead">
    <div class="masthead-row">
      <a class="wordmark" href="#/">Real Estate&nbsp;Briefing</a>
      <nav class="date-nav" id="date-nav" aria-label="Change day">
        <button id="prev-day" class="nav-arrow" aria-label="Previous day">‹</button>
        <span id="current-date"></span>
        <button id="next-day" class="nav-arrow" aria-label="Next day">›</button>
      </nav>
    </div>
    <div class="tab-row">
      <nav class="tabs" aria-label="Views">
        <a href="#/" data-tab="briefing">Briefing</a>
        <a href="#/map" data-tab="map">Map</a>
        <a href="#/weekly" data-tab="weekly">Weekly</a>
        <a href="#/players" data-tab="players">Players</a>
        <a href="#/history" data-tab="history">History</a>
        <a href="#/rates" data-tab="rates">Rates</a>
      </nav>
      <a id="rate-strip" class="rate-strip" href="#/rates" hidden></a>
    </div>
  </header>

  <main>
    <!-- Briefing -->
    <section id="view-briefing" class="view" hidden>
      <p id="empty-state" hidden></p>
      <div id="lede-block" hidden>
        <p id="lede"></p>
        <ul id="key-points"></ul>
        <div id="watch-row" hidden></div>
      </div>
      <div id="controls" class="controls" hidden></div>
      <div id="feed"></div>
      <p id="day-notes" hidden></p>
      <footer class="colophon"><span id="generated-at"></span></footer>
    </section>

    <!-- Map -->
    <section id="view-map" class="view" hidden>
      <div class="map-bar">
        <span class="map-title" id="map-title"></span>
        <div class="map-toggle" role="group" aria-label="Map scope">
          <button id="map-mode-day" class="on">This day</button>
          <button id="map-mode-all">All days</button>
        </div>
      </div>
      <div id="map-legend" class="map-legend"></div>
      <div id="map-canvas"></div>
      <p class="map-hint">Tap a pin to preview the deal; tap the headline to read it. Tap a legend chip to isolate that type.</p>
    </section>

    <!-- Weekly -->
    <section id="view-weekly" class="view" hidden>
      <div id="weekly-content"></div>
    </section>

    <!-- Players -->
    <section id="view-players" class="view" hidden>
      <div id="players-content"></div>
    </section>

    <!-- History -->
    <section id="view-history" class="view" hidden>
      <div id="history-list"></div>
    </section>

    <!-- Rates -->
    <section id="view-rates" class="view" hidden>
      <div id="rates-content"></div>
    </section>
  </main>

  <!-- Reader overlay -->
  <div id="reader" hidden>
    <div class="reader-bar">
      <button id="reader-back" aria-label="Back to briefing">‹ Back</button>
      <a id="reader-original" href="#" target="_blank" rel="noopener">Original ↗</a>
    </div>
    <article class="reader-article">
      <p class="reader-kicker" id="reader-kicker"></p>
      <h1 id="reader-title"></h1>
      <p class="reader-meta" id="reader-meta"></p>
      <figure class="reader-hero" id="reader-hero" hidden><img id="reader-hero-img" alt=""></figure>
      <div class="reader-body" id="reader-body"></div>
      <div class="reader-end">
        <a id="reader-original-end" href="#" target="_blank" rel="noopener">Read at the source ↗</a>
      </div>
    </article>
  </div>

  <div id="toast" role="status"></div>

  <script src="js/app.js?v=12"></script>
</body>
</html>
